<section id="hero">
  <div class="container">
    <div class="hero-container-wrapper">
      <div class="hero-w-inner">
        <h1 class="hero-header">
          Discover the magic of
          <span class="hero-header-span">photography</span> in our school
        </h1>
        <p class="hero-description">
          Our photography school offers an unforgettable journey, where you can
          learn the basics of composition, master technical skills, translate
          your unique ideas.
        </p>
        <div class="hero-content">
          <div class="hero-reviews-users">
            <div class="hero-reviews-users-images">
              <img src="../img/user-one.png" alt="" class="user-img" />
              <img src="../img/user-two.png" alt="" class="user-img" />
              <img src="../img/user-three.png" alt="" class="user-img" />
            </div>
            <a href="#reviews">
              <div class="hero-content-reviews">
                <div class="hero-content-reviews-text">
                  Our happy <br />
                  students
                </div>
                <svg width="18" height="9" class="icon-arrow">
                  <use href="../img/hero-icons.svg#icon-arrow"></use>
                </svg>
              </div>
            </a>
          </div>
          <div class="hero-reviews-star">
            <svg width="20" height="20" class="icon-star">
              <use href="../img/hero-icons.svg#icon-star"></use>
            </svg>
            <div class="hero-reviews-star-text">
              <p class="star-text-one">Reviews</p>
              <p class="star-text-two">+1500</p>
            </div>
          </div>
        </div>
      </div>
      <div class="hero-img-div">
        <img src="/img/hero.png" class="hero-image" />
      </div>
    </div>
  </div>
</section>
